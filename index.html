<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сюрприз</title>
    <style>
        :root {
            --bg-color: #f2f5eb; 
            --main-green: #7c9473;
            --soft-green: #cfdcc6;
        }
        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: #3e4d35;
        }
        .container { text-align: center; }
        .heart-link {
            font-size: 120px;
            cursor: pointer;
            transition: transform 0.3s ease;
            user-select: none;
        }
        .heart-link:hover { transform: scale(1.15) rotate(5deg); }
        #menu {
            display: none;
            gap: 20px;
            animation: fadeIn 0.6s ease;
        }
        .emoji-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid var(--soft-green);
            font-size: 60px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .emoji-card:hover {
            transform: translateY(-10px);
            background-color: var(--soft-green);
            border-color: var(--main-green);
        }
        .result-box {
            display: none;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #text-msg {
            font-size: 26px;
            background: white;
            padding: 30px;
            border-radius: 25px;
            border: 3px solid var(--main-green);
            max-width: 320px;
        }
        .heart-shape {
            width: 300px;
            height: 270px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            transform: scale(1.3);
            color: #5a7a4a;
            font-weight: bold;
            font-size: 18px;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
<div class="container">
    <div id="step1" class="heart-link" onclick="showMenu()">🤍</div>
    <div id="menu">
        <div class="emoji-card" onclick="finish('hedgehog')">🦔</div>
        <div class="emoji-card" onclick="finish('cactus')">🌵</div>
        <div class="emoji-card" onclick="finish('dino')">🦖</div>
    </div>
    <div id="res-text" class="result-box">
        <div id="text-msg"></div>
    </div>
    <div id="res-heart" class="result-box">
        <div class="heart-shape">Ты моя самая любимая булка</div>
    </div>
</div>
<script>
    function showMenu() {
        document.getElementById('step1').style.display = 'none';
        document.getElementById('menu').style.display = 'flex';
    }
    function finish(choice) {
        document.getElementById('menu').style.display = 'none';
        if (choice === 'hedgehog') {
            document.getElementById('res-heart').style.display = 'block';
        } else {
            const box = document.getElementById('res-text');
            const msg = document.getElementById('text-msg');
            if (choice === 'cactus') { msg.innerText = "Я тебя люблю, так что тебе хватит"; }
            else if (choice === 'dino') { msg.innerText = "ТЫ"; }
            box.style.display = 'block';
        }
    }
</script>
</body>
</html>
