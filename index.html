<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сюрприз</title>
    <style>
        :root {
            --bg-color: #f2f5eb; 
            --main-green: #7c9473;
            --soft-green: #cfdcc6;
        }
        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: #3e4d35;
        }
        .container { text-align: center; padding: 20px; }
        .heart-link {
            font-size: 100px;
            cursor: pointer;
            transition: transform 0.3s ease;
            user-select: none;
        }
        .heart-link:hover { transform: scale(1.1); }
        
        #menu {
            display: none;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 0.6s ease;
        }
        .emoji-card {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid var(--soft-green);
            font-size: 50px;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .emoji-card:hover {
            transform: translateY(-5px);
            background-color: var(--soft-green);
        }

        .result-box {
            display: none;
            animation: pop 0.4s ease;
        }
        #text-msg {
            font-size: 24px;
            background: white;
            padding: 40px 20px;
            border-radius: 30px;
            border: 4px solid var(--main-green);
            max-width: 280px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            line-height: 1.4;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="step1" class="heart-link" onclick="showMenu()">🤍</div>

    <div id="menu">
        <div class="emoji-card" onclick="finish('Я тебя люблю, ты моя любимая булка')">🦔</div>
        <div class="emoji-card" onclick="finish('Я тебя люблю, так что тебе хватит')">🌵</div>
        <div class="emoji-card" onclick="finish('ТЫ')">🦖</div>
    </div>

    <div id="res-text" class="result-box">
        <div id="text-msg"></div>
    </div>
</div>

<script>
    function showMenu() {
        document.getElementById('step1').style.display = 'none';
        document.getElementById('menu').style.display = 'flex';
    }

    function finish(message) {
        document.getElementById('menu').style.display = 'none';
        const box = document.getElementById('res-text');
        const msg = document.getElementById('text-msg');
        msg.innerText = message;
        box.style.display = 'block';
    }
</script>

</body>
</html>
